<script>
  $(document).ready(function () {
    const gallery = $('#gallery');
    
    // Check if gallery is selected correctly
    console.log(gallery);
    
    // Apply imagesLoaded to the gallery and check when all images are loaded
    gallery.imagesLoaded()
      .done(function() {
        console.log('All images successfully loaded.');
      })
      .fail(function() {
        console.log('One or more images failed to load.');
      })
      .always(function() {
        console.log('Images loaded (success or fail).');
      });
  });
</script>

<div class="mm-columns" id="gallery">
  {% for item in site.data.index %}
  <div class="mm-columns__item">
    <a href="{{ item.src_url }}" target="_blank">
      <img
        class="mm-columns__img"
        loading="lazy"
        src="{{ item.src_url }}"
        onerror="this.src='assets/images/tort.jpg'"
        alt="{{ item.name }}"

         <!-- data-src="{{ item.src_url }}" 
        src="assets/images/tort.jpg"  -->

      />
    </a>
    <div class="overlay">{{ item.name }}</div>
  </div>
  {% endfor %}
</div>
</body>
</html>
