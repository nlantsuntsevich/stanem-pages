<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Essential META Tags -->
    <meta property="og:title" content="Kitchen Religion" />
    <meta property="og:type" content="website" />
    <meta
      property="og:image"

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title }}</title>

  <body>
